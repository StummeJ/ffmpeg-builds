# Research & Development Build
# Development-focused build with debugging and additional tools

workflow_inputs:
  ffmpeg_version: "latest"
  feature_set: "custom"
  enable_cuda: true
  enable_nonfree: false
  enable_npp: false
  custom_configure_args: "--enable-debug --enable-gpl --enable-libx264 --enable-libx265 --enable-libvpx --extra-cflags=-g"

description: |
  This configuration provides an FFmpeg build optimized for research and development:
  
  Features:
  - Debug symbols for easier troubleshooting
  - Standard codec set for testing
  - CUDA support for performance research
  - Additional compiler flags for debugging
  - GPL components enabled
  
  Perfect for:
  - FFmpeg development and testing
  - Performance benchmarking
  - Algorithm research
  - Custom filter development

recommended_use_cases:
  - FFmpeg core development
  - Custom filter creation
  - Performance analysis and optimization
  - Educational and research projects
  - Debugging encoding/decoding issues