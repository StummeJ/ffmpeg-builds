name: Build FFmpeg with CUDA Support

"on":
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg version to build (8.0, latest, or specific version like 7.1.1)'
        required: true
        default: '8.0'
        type: string
      feature_set:
        description: 'Feature set to build'
        required: true
        default: 'full'
        type: choice
        options:
          - minimal
          - standard  
          - full
          - custom
      enable_cuda:
        description: 'Enable NVIDIA CUDA support'
        required: true
        default: true
        type: boolean
      enable_nonfree:
        description: 'Enable non-free codecs and libraries'
        required: true
        default: true
        type: boolean
      enable_npp:
        description: 'Enable NVIDIA Performance Primitives (NPP)'
        required: true
        default: true
        type: boolean
      build_x264:
        description: 'Build x264 encoder'
        required: true
        default: true
        type: boolean
      build_x265:
        description: 'Build x265 encoder'
        required: true
        default: true
        type: boolean
      build_av1:
        description: 'Build AV1 encoders (aom, svt-av1)'
        required: true
        default: true
        type: boolean
      standalone_binaries:
        description: 'Build standalone binaries for included libraries'
        required: true
        default: false
        type: boolean
      cuda_version:
        description: 'CUDA version to install (13.0.0, 12.6.0, 12.5.0, etc.)'
        required: true
        default: '13.0.0'
        type: string
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cache CUDA SDK
      if: ${{ github.event.inputs.enable_cuda == 'true' || github.event.inputs.enable_cuda == '' || github.event.inputs.enable_cuda == null }}
      id: cache-cuda
      uses: actions/cache@v4
      with:
        path: |
          C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{ github.event.inputs.cuda_version || '13.0.0' }}
          C:\Program Files\NVIDIA Corporation\Nsight*
        key: cuda-v${{ github.event.inputs.cuda_version || '13.0.0' }}-${{ runner.os }}
          
    - name: Cache media-autobuild_suite
      uses: actions/cache@v4
      with:
        path: |
          media-autobuild_suite
        key: media-autobuild-suite-${{ hashFiles('.github/workflows/build-ffmpeg.yml') }}
        restore-keys: |
          media-autobuild-suite-
      
    - name: Setup Build Environment Info
      run: |
        echo "Building FFmpeg with the following configuration:"
        echo "FFmpeg Version: ${{ github.event.inputs.ffmpeg_version || '8.0' }}"
        echo "Feature Set: ${{ github.event.inputs.feature_set || 'full' }}"
        echo "CUDA Support: ${{ github.event.inputs.enable_cuda || 'true' }}"
        echo "CUDA Version: ${{ github.event.inputs.cuda_version || '13.0.0' }}"
        echo "Non-free Support: ${{ github.event.inputs.enable_nonfree || 'true' }}"
        echo "NPP Support: ${{ github.event.inputs.enable_npp || 'true' }}"
        echo "x264 Support: ${{ github.event.inputs.build_x264 || 'true' }}"
        echo "x265 Support: ${{ github.event.inputs.build_x265 || 'true' }}"
        echo "AV1 Support: ${{ github.event.inputs.build_av1 || 'true' }}"
        echo "Standalone Binaries: ${{ github.event.inputs.standalone_binaries || 'false' }}"

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkg-config
          git
          wget
          unzip
        
    - name: Download and Install CUDA SDK
      if: ${{ (github.event.inputs.enable_cuda == 'true' || github.event.inputs.enable_cuda == '' || github.event.inputs.enable_cuda == null) && steps.cache-cuda.outputs.cache-hit != 'true' }}
      shell: powershell
      run: |
        Write-Host "Downloading CUDA SDK v${{ github.event.inputs.cuda_version || '13.0.0' }}..."
        $cudaUrl = "https://developer.download.nvidia.com/compute/cuda/${{ github.event.inputs.cuda_version || '13.0.0' }}/network_installers/cuda_${{ github.event.inputs.cuda_version || '13.0.0' }}_windows_network.exe"
        $cudaInstaller = "cuda_installer.exe"
        
        Invoke-WebRequest -Uri $cudaUrl -OutFile $cudaInstaller
        
        Write-Host "Installing CUDA SDK silently..."
        Start-Process -Wait -FilePath $cudaInstaller -ArgumentList "-s"
        
        # Verify installation
        $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{ github.event.inputs.cuda_version || '13.0.0' }}\bin\nvcc.exe"
        if (Test-Path $cudaPath) {
          Write-Host "CUDA SDK v${{ github.event.inputs.cuda_version || '13.0.0' }} installed successfully"
          # Set environment variables for the session
          $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{ github.event.inputs.cuda_version || '13.0.0' }}"
          echo "CUDA_PATH=$env:CUDA_PATH" >> $env:GITHUB_ENV
          echo "CUDA_PATH_V${{ github.event.inputs.cuda_version || '13.0.0' | Replace '.', '_' }}=$env:CUDA_PATH" >> $env:GITHUB_ENV
        } else {
          throw "CUDA SDK installation failed"
        }
      
    - name: Setup CUDA Environment
      if: ${{ github.event.inputs.enable_cuda == 'true' || github.event.inputs.enable_cuda == '' || github.event.inputs.enable_cuda == null }}
      shell: powershell
      run: |
        $cudaVersion = "${{ github.event.inputs.cuda_version || '13.0.0' }}"
        $cuda_path = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaVersion"
        
        # Add CUDA to PATH
        echo "$cuda_path\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "$cuda_path\libnvvp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
        # Set CUDA environment variables
        echo "CUDA_PATH=$cuda_path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $versionEnvVar = "CUDA_PATH_V$($cudaVersion.Replace('.', '_'))"
        echo "$versionEnvVar=$cuda_path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
        # Verify CUDA installation
        Write-Output "Verifying CUDA installation..."
        if (Test-Path "$cuda_path\bin\nvcc.exe") {
          Write-Output "✅ CUDA compiler found at: $cuda_path\bin\nvcc.exe"
          & "$cuda_path\bin\nvcc.exe" --version
        } else {
          Write-Output "⚠️  CUDA compiler not found at expected location"
        }
        
        Write-Host "CUDA v$cudaVersion environment configured successfully"

    - name: Clone media-autobuild_suite
      shell: msys2 {0}
      run: |
        cd /d/a/ffmpeg-builds/ffmpeg-builds
        if [ ! -d "media-autobuild_suite" ]; then
          git clone --depth 1 https://github.com/m-ab-s/media-autobuild_suite.git
        else
          echo "media-autobuild_suite already exists (from cache)"
        fi
        cd media-autobuild_suite
        ls -la

    - name: Configure Build Options
      shell: msys2 {0}
      run: |
        cd /d/a/ffmpeg-builds/ffmpeg-builds/media-autobuild_suite
        
        # Create build directory if it doesn't exist
        mkdir -p build
        
        # Determine configuration values based on inputs
        ARCH=3  # 64-bit only
        
        # License: 1=Non-free if nonfree enabled, 4=LGPLv3 otherwise
        if [[ "${{ github.event.inputs.enable_nonfree }}" == "true" || "${{ github.event.inputs.enable_nonfree }}" == "" ]]; then
          LICENSE=1
        else
          LICENSE=4
        fi
        
        # Feature set mapping determines how many additional codecs/libraries are enabled
        FEATURE_SET="${{ github.event.inputs.feature_set }}"
        if [[ "$FEATURE_SET" == "" ]]; then
          FEATURE_SET="full"
        fi
        case "$FEATURE_SET" in
          "minimal")
            FFMPEG_CHOICE=2  # Light build
            ENABLE_EXTRA_CODECS=false
            ;;
          "standard")
            FFMPEG_CHOICE=3  # Zeranoe build
            ENABLE_EXTRA_CODECS=false
            ;;
          "full"|"custom")
            FFMPEG_CHOICE=4  # Full build
            ENABLE_EXTRA_CODECS=true
            ;;
        esac
        
        # Individual codec settings
        X264=$([ "${{ github.event.inputs.build_x264 }}" == "false" ] && echo "2" || echo "1")
        X265=$([ "${{ github.event.inputs.build_x265 }}" == "false" ] && echo "2" || echo "1")
        AOM=$([ "${{ github.event.inputs.build_av1 }}" == "false" ] && echo "2" || echo "1")
        VPX=$([ "${{ github.event.inputs.build_av1 }}" == "false" ] && echo "2" || echo "1")
        SVT_AV1=$([ "${{ github.event.inputs.build_av1 }}" == "false" ] && echo "2" || echo "1")
        
        # Standalone binaries
        STANDALONE=$([ "${{ github.event.inputs.standalone_binaries }}" == "true" ] && echo "1" || echo "2")
        
        # Set codec/library values based on feature set
        if [[ "$ENABLE_EXTRA_CODECS" == "true" ]]; then
          # Full feature set - enable most useful codecs and libraries
          OTHER265=1      # kvazaar H.265 encoder
          FLAC=1         # FLAC codec
          MEDIAINFO=1    # MediaInfo tool
          SOXB=1         # SoX audio processor
          MP4BOX=1       # MP4Box tool
          RTMPDUMP=1     # RTMP streaming
          BMX=1          # BMX tools
          EXHALE=1       # xHE-AAC encoder
          CURL=1         # cURL library
          RIPGREP=1      # ripgrep search tool
          LIBAVIF=1      # AVIF image format
          LIBHEIF=1      # HEIF image format  
          JQ=1           # JSON processor
          DSSIM=1        # Image similarity tool
          AVFS2=1        # AVS2 codec
          DOVITOOL=1     # Dolby Vision tool
          HDR10PLUSTOOL=1 # HDR10+ tool
          CCACHE=1       # Compiler cache
          SVTHEVC=1      # SVT-HEVC encoder
          SVTVP9=1       # SVT-VP9 encoder
          JO=1           # JSON output tool
          JPEGXL=1       # JPEG XL support
          VVENC=1        # VVC encoder
          VVDEC=1        # VVC decoder
        else
          # Minimal/Standard feature set - disable extra codecs
          OTHER265=2
          FLAC=2
          MEDIAINFO=2
          SOXB=2
          MP4BOX=2
          RTMPDUMP=2
          BMX=2
          EXHALE=2
          CURL=2
          RIPGREP=2
          LIBAVIF=2
          LIBHEIF=2
          JQ=2
          DSSIM=2
          AVFS2=2
          DOVITOOL=2
          HDR10PLUSTOOL=2
          CCACHE=2
          SVTHEVC=2
          SVTVP9=2
          JO=2
          JPEGXL=2
          VVENC=2
          VVDEC=2
        fi
        
        # Create media-autobuild_suite.ini file with configuration
        cat > build/media-autobuild_suite.ini << EOF
        [compiler list]
        arch=${ARCH}
        license2=${LICENSE}
        vpx2=${VPX}
        x2643=${X264}
        x2652=${X265}
        other265=${OTHER265}
        flac=${FLAC}
        fdkaac=1
        mediainfo=${MEDIAINFO}
        soxB=${SOXB}
        ffmpegB2=1
        ffmpegUpdate=2
        ffmpegChoice=${FFMPEG_CHOICE}
        ffmpegKeepLegacyOpts=2
        mp4box=${MP4BOX}
        rtmpdump=${RTMPDUMP}
        mplayer2=2
        mpv=2
        cores=2
        deleteSource=1
        strip=1
        pack=2
        logging=1
        bmx=${BMX}
        standalone=${STANDALONE}
        updateSuite=2
        av1an=2
        aom=${AOM}
        faac=2
        exhale=${EXHALE}
        ffmbc=2
        curl=${CURL}
        cyanrip2=2
        rav1e=1
        ripgrep=${RIPGREP}
        dav1d=1
        libavif=${LIBAVIF}
        libheif=${LIBHEIF}
        vvc=2
        uvg266=2
        jq=${JQ}
        dssim=${DSSIM}
        gifski=2
        avs2=${AVFS2}
        dovitool=${DOVITOOL}
        hdr10plustool=${HDR10PLUSTOOL}
        timeStamp=2
        noMintty=1
        ccache=${CCACHE}
        svthevc=${SVTHEVC}
        svtav1=${SVT_AV1}
        svtvp9=${SVTVP9}
        xvc=2
        jo=${JO}
        vlc=2
        CC=1
        jpegxl=${JPEGXL}
        vvenc=${VVENC}
        vvdec=${VVDEC}
        zlib=3
        ffmpegPath=2
        pkgUpdateTime=86400
        EOF
        
        echo "Generated media-autobuild_suite.ini configuration:"
        cat build/media-autobuild_suite.ini
        
        echo ""
        echo "Configuration Summary:"
        echo "Architecture: 64-bit only"
        echo "License: $([ $LICENSE -eq 1 ] && echo 'Non-free' || echo 'LGPL')"
        echo "Feature Set: $FEATURE_SET"
        echo "FFmpeg Choice: $FFMPEG_CHOICE ($([ $FFMPEG_CHOICE -eq 2 ] && echo 'Light' || [ $FFMPEG_CHOICE -eq 3 ] && echo 'Zeranoe' || echo 'Full'))"
        echo "x264: $([ $X264 -eq 1 ] && echo 'Enabled' || echo 'Disabled')"
        echo "x265: $([ $X265 -eq 1 ] && echo 'Enabled' || echo 'Disabled')"
        echo "AV1: $([ $AOM -eq 1 ] && echo 'Enabled' || echo 'Disabled')"
        echo "Standalone: $([ $STANDALONE -eq 1 ] && echo 'Enabled' || echo 'Disabled')"
        echo "Extra Codecs: $ENABLE_EXTRA_CODECS"
        
        # Create ffmpeg_options.txt for CUDA/NPP support if needed
        if [[ "${{ github.event.inputs.enable_cuda }}" != "false" || "${{ github.event.inputs.enable_npp }}" != "false" ]]; then
          echo ""
          echo "Creating ffmpeg_options.txt for CUDA/NPP support..."
          cat > build/ffmpeg_options.txt << 'EOF'
        # FFmpeg options file - generated by GitHub Actions
        # Lines starting with # are ignored
        
        # Basic built-in options
        --disable-autodetect
        amf
        bzlib
        cuda
        cuvid
        d3d12va
        d3d11va
        dxva2
        iconv
        lzma
        nvenc
        schannel
        zlib
        sdl2
        ffnvcodec
        nvdec
        cuda-llvm
        
        # Common external libs  
        gmp
        gpl
        libmp3lame
        libopus
        libvorbis
        libvpx
        libx264
        libx265
        libdav1d
        libaom
        --disable-debug
        libfdk-aac
        EOF
          
          # Add NPP support if enabled
          if [[ "${{ github.event.inputs.enable_npp }}" != "false" ]]; then
            echo "libnpp" >> build/ffmpeg_options.txt
          fi
          
          # Add CUDA filters if CUDA enabled  
          if [[ "${{ github.event.inputs.enable_cuda }}" != "false" ]]; then
            echo "cuda-nvcc" >> build/ffmpeg_options.txt
          fi
          
          echo "Generated ffmpeg_options.txt:"
          cat build/ffmpeg_options.txt
        fi

    - name: Run media-autobuild_suite
      shell: msys2 {0}
      run: |
        cd /d/a/ffmpeg-builds/ffmpeg-builds/media-autobuild_suite
        
        # Make the script executable
        chmod +x media-autobuild_suite.bat
        
        # Set up the build environment
        export MSYSTEM=MINGW64
        export CC=gcc
        export CXX=g++
        
        # Add custom configure args if provided for custom feature set
        if [[ "${{ github.event.inputs.feature_set }}" == "custom" ]]; then
          echo "Custom feature set selected - using default full build configuration"
        fi
        
        # Run the build suite
        echo "Starting FFmpeg build process..."
        timeout 300m ./media-autobuild_suite.bat --build=64bit --delete-source=n --logging=y || true
        
        # Check if build completed
        if [[ -d "local64/bin-video" ]]; then
          echo "Build completed successfully"
          ls -la local64/bin-video/
        else
          echo "Build may have failed or is incomplete"
          find . -name "ffmpeg.exe" -type f 2>/dev/null || echo "FFmpeg executable not found"
        fi

    - name: Package Build Artifacts
      shell: msys2 {0}
      run: |
        cd /d/a/ffmpeg-builds/ffmpeg-builds
        
        # Create artifacts directory
        mkdir -p artifacts/ffmpeg-build
        
        # Copy built binaries
        if [[ -d "media-autobuild_suite/local64/bin-video" ]]; then
          cp -r media-autobuild_suite/local64/bin-video/* artifacts/ffmpeg-build/ 2>/dev/null || true
        fi
        
        # Find and copy FFmpeg executables from any location
        find media-autobuild_suite -name "ffmpeg.exe" -exec cp {} artifacts/ffmpeg-build/ \; 2>/dev/null || true
        find media-autobuild_suite -name "ffprobe.exe" -exec cp {} artifacts/ffmpeg-build/ \; 2>/dev/null || true
        find media-autobuild_suite -name "ffplay.exe" -exec cp {} artifacts/ffmpeg-build/ \; 2>/dev/null || true
        
        # Create build info file
        cat > artifacts/ffmpeg-build/build-info.txt << EOF
        FFmpeg Build Information
        ========================
        Build Date: $(date)
        FFmpeg Version: ${{ github.event.inputs.ffmpeg_version || '8.0' }}
        Feature Set: ${{ github.event.inputs.feature_set || 'full' }}
        CUDA Support: ${{ github.event.inputs.enable_cuda || 'true' }}
        CUDA Version: ${{ github.event.inputs.cuda_version || '13.0.0' }}
        Non-free Support: ${{ github.event.inputs.enable_nonfree || 'true' }}
        NPP Support: ${{ github.event.inputs.enable_npp || 'true' }}
        x264 Support: ${{ github.event.inputs.build_x264 || 'true' }}
        x265 Support: ${{ github.event.inputs.build_x265 || 'true' }}
        AV1 Support: ${{ github.event.inputs.build_av1 || 'true' }}
        Standalone Binaries: ${{ github.event.inputs.standalone_binaries || 'false' }}
        
        Build Environment:
        - Windows Runner: windows-latest
        - CUDA Version: ${{ github.event.inputs.cuda_version || '13.0.0' }}
        EOF
        
        # List final artifacts
        echo "Final build artifacts:"
        ls -la artifacts/ffmpeg-build/ || echo "No artifacts found"
        
        # Check if we have any executables
        if [[ -f "artifacts/ffmpeg-build/ffmpeg.exe" ]]; then
          echo "FFmpeg executable found!"
          ./artifacts/ffmpeg-build/ffmpeg.exe -version || echo "Could not run ffmpeg -version"
        else
          echo "Warning: FFmpeg executable not found in artifacts"
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ffmpeg-cuda-build-${{ github.event.inputs.ffmpeg_version || '8.0' }}-${{ github.event.inputs.feature_set || 'full' }}
        path: artifacts/ffmpeg-build/
        retention-days: 30

    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          media-autobuild_suite/build/logs/
          media-autobuild_suite/*.log
        retention-days: 7

    - name: Create Release Archive
      if: success()
      shell: msys2 {0}
      run: |
        cd /d/a/ffmpeg-builds/ffmpeg-builds
        
        # Create release archive
        RELEASE_NAME="ffmpeg-${{ github.event.inputs.ffmpeg_version || '8.0' }}-win64-cuda"
        if [[ "${{ github.event.inputs.feature_set }}" != "full" ]]; then
          RELEASE_NAME="${RELEASE_NAME}-${{ github.event.inputs.feature_set }}"
        fi
        
        # Create zip archive
        cd artifacts
        zip -r "../${RELEASE_NAME}.zip" ffmpeg-build/
        cd ..
        
        # Export to GitHub environment (convert MSYS2 paths)
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        echo "RELEASE_FILE=${RELEASE_NAME}.zip" >> $GITHUB_ENV
        
        ls -la "${RELEASE_NAME}.zip"

    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.ffmpeg_version || '8.0' }}-${{ github.run_number }}
        name: FFmpeg ${{ github.event.inputs.ffmpeg_version || '8.0' }} Windows Build
        body: |
          # FFmpeg ${{ github.event.inputs.ffmpeg_version || '8.0' }} Windows x64 Build with CUDA Support

          ## 🚀 Build Configuration
          - **FFmpeg Version**: ${{ github.event.inputs.ffmpeg_version || '8.0' }}
          - **Feature Set**: ${{ github.event.inputs.feature_set || 'full' }}
          - **CUDA Support**: ${{ github.event.inputs.enable_cuda == 'true' && '✅ Enabled' || '❌ Disabled' }}
          - **Non-free Codecs**: ${{ github.event.inputs.enable_nonfree == 'false' && '❌ Disabled' || '✅ Enabled' }}
          - **NPP Support**: ${{ github.event.inputs.enable_npp == 'false' && '❌ Disabled' || '✅ Enabled' }}
          - **x264 Encoder**: ${{ github.event.inputs.build_x264 == 'false' && '❌ Disabled' || '✅ Enabled' }}
          - **x265 Encoder**: ${{ github.event.inputs.build_x265 == 'false' && '❌ Disabled' || '✅ Enabled' }}
          - **AV1 Encoders**: ${{ github.event.inputs.build_av1 == 'false' && '❌ Disabled' || '✅ Enabled' }}
          - **Standalone Tools**: ${{ github.event.inputs.standalone_binaries == 'true' && '✅ Enabled' || '❌ Disabled' }}

          ## 📦 What's Included
          - `ffmpeg.exe` - Main FFmpeg executable with all configured features
          - `ffprobe.exe` - Media analysis tool
          - `ffplay.exe` - Simple media player (if built)
          - `build-info.txt` - Detailed build configuration and system information

          ## 🎮 Hardware Acceleration
          ${{ github.event.inputs.enable_cuda == 'true' && 'This build includes NVIDIA CUDA hardware acceleration support:
          - **NVENC**: Hardware-accelerated encoding (H.264/H.265)
          - **CUVID/NVDEC**: Hardware-accelerated decoding
          - **Compatible GPUs**: GTX 10xx series and newer
          
          To verify CUDA support:
          ```cmd
          ffmpeg.exe -hwaccels
          ffmpeg.exe -encoders | findstr nvenc
          ```' || 'CUDA support is disabled in this build.' }}

          ## 🔧 System Requirements
          - Windows 10/11 x64
          ${{ github.event.inputs.enable_cuda == 'true' && '- NVIDIA GPU with compute capability 3.0+ (GTX 10xx series or newer)
          - Latest NVIDIA drivers' || '' }}
          - Visual C++ Redistributable (usually pre-installed)

          ---
          **Build ID**: ${{ github.run_number }}
          **Built on**: ${{ github.run_started_at }}
        files: |
          ${{ env.RELEASE_FILE }}
        draft: false
        prerelease: false

    - name: Upload Additional Release Assets
      if: success()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.ffmpeg_version || '8.0' }}-${{ github.run_number }}
        files: |
          artifacts/ffmpeg-build/build-info.txt



    - name: Save media-autobuild_suite Cache on Failure  
      if: failure()
      uses: actions/cache/save@v3
      with:
        path: |
          media-autobuild_suite
        key: media-autobuild-suite-${{ hashFiles('.github/workflows/build-ffmpeg.yml') }}-failure-${{ github.run_number }}

    - name: Save CUDA Cache on Failure
      if: failure() && (github.event.inputs.enable_cuda == 'true' || github.event.inputs.enable_cuda == '' || github.event.inputs.enable_cuda == null)
      uses: actions/cache/save@v3
      with:
        path: |
          C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{ github.event.inputs.cuda_version || '13.0.0' }}
          C:\Program Files\NVIDIA Corporation\Nsight*
        key: cuda-v${{ github.event.inputs.cuda_version || '13.0.0' }}-${{ runner.os }}-failure-${{ github.run_number }}